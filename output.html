<!DOCTYPE html>
<html>
<head>
<style>
/* Basic Reset */
body, div, span { margin: 0; padding: 0; box-sizing: border-box; overflow: hidden; }
.App-0 {
    width: 400px;
    height: 300px;
    background-color: #f0f0f0;
}
.Row-1 {
    display: flex;
    flex-direction: row;
    width: 100%;
    height: 60px;
    gap: 20px;
    background-color: #333;
}
.Rect-2 {
    width: 40px;
    height: 40px;
    border-radius: 20px;
    background-color: white;
}
.Text-3 {
    color: white;
}
</style>
</head>
<body class="App-0">
<div class="Row-1"><div class="Rect-2"></div><span class="Text-3">Hello, Nota!</span></div></body>
</html>
